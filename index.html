<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Casino Compan - Live Board 27" Vertical</title>
    <style>
        :root {
            --bg-dark: #000000; /* Noir OLED Absolu */
            --panel-texture: #000000;
            --casino-red: #d61c1c;
            --casino-black: #111113;
            --casino-green: #0b9351;
            --text-gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- EN-TÊTE XXL --- */
        header {
            background: #000000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #1a1a1a;
            height: 120px;
            flex-shrink: 0;
        }

        .brand-logo .brand-name {
            font-size: 3.2rem;
            letter-spacing: 4px;
            font-weight: bold;
            color: var(--text-gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        .croupier-box {
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 1.4rem;
            color: #ddd;
            font-weight: bold;
        }

        .croupier-name {
            color: #fff;
            font-family: 'Impact', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .table-badge {
            color: var(--text-gold);
            font-size: 2.8rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- LAYOUT GLOBAL --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- HISTORIQUE GÉANT COLUMN (GAUCHE) --- */
        .left-sidebar {
            width: 32%;
            background-color: var(--panel-texture);
            border-right: 4px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100%;
        }

        .current-number-box {
            background-color: #000000;
            border: 4px solid #252525;
            border-radius: 12px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            flex-shrink: 0;
            font-size: 9rem;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
        }

        .history-rows-container {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            overflow-y: auto;
            flex: 1;
            padding-bottom: 40px;
        }

        .history-line {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            align-items: center;
            height: 80px; 
            flex-shrink: 0;
        }

        .history-line.zero-line {
            display: block;
            text-align: center;
        }

        .hist-cell {
            font-size: 5.5rem; /* Ultra large pour le 27 pouces */
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .hist-cell.empty {
            visibility: hidden;
        }

        /* --- CONTENU DROITE --- */
        .right-content {
            width: 68%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #000000;
        }

        /* --- CYLINDRE GÉANT STYLE PHYSIQUE --- */
        .roulette-ribbon-container {
            height: 260px; /* Augmenté massivement */
            background: linear-gradient(to bottom, #050505 0%, #151515 50%, #000 100%);
            border-bottom: 4px solid #222;
            border-top: 4px solid #222;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* Arche chromée style vraie roulette */
        .roulette-ribbon-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 16px;
            background: linear-gradient(to bottom, #fff, #777, #333);
            z-index: 5;
        }
        .roulette-ribbon-container::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 16px;
            background: linear-gradient(to top, #fff, #777, #333);
            z-index: 5;
        }

        .ribbon-viewport {
            width: 650px; /* Élargi pour voir 5 grandes cases */
            height: 210px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ribbon-wheel-track {
            display: flex;
            align-items: center;
            position: absolute;
            left: 0;
            height: 100%;
        }

        .ribbon-pocket {
            width: 120px;
            height: 190px;
            margin: 0 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem; /* Énorme taille */
            font-weight: bold;
            border: 3px solid #444;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
            flex-shrink: 0;
            position: relative;
        }

        /* Séparateurs en relief blanc/argent comme sur l'image */
        .ribbon-pocket::after {
            content: '';
            position: absolute;
            right: -6px; top: 15px; bottom: 15px; width: 5px;
            background: linear-gradient(to right, #fff, #999, #444);
            border-radius: 2px;
            z-index: 4;
        }

        .ribbon-pocket.active-pocket {
            border: 5px solid #ffffff;
            transform: scale(1.03);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.4);
        }

        .ball-overlay {
            position: absolute;
            bottom: 30px;
            width: 42px;
            height: 42px;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #e0e0e0 40%, #888 100%);
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(0,0,0,1), 0 0 8px rgba(255,255,255,0.8);
            z-index: 10;
        }

        /* --- STATISTIQUES GÉANTES & LABELS SYNCHRONISÉS --- */
        .stats-section {
            background-color: #000000;
            padding: 25px 35px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-shrink: 0;
        }

        /* Container de labels calqué dynamiquement sur les barres */
        .dynamic-stat-labels {
            display: flex;
            width: 100%;
            font-family: Arial, sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #d1d5db;
            margin-bottom: 5px;
            text-align: center;
        }
        .lbl-left { text-align: left; padding-left: 5px; transition: width 0.4s ease; }
        .lbl-mid { text-align: center; transition: width 0.4s ease; color: var(--casino-green); }
        .lbl-right { text-align: right; padding-right: 5px; transition: width 0.4s ease; }

        .bar-wrapper {
            height: 100px; /* Plus haut pour écran 27" */
            border: 4px solid #222;
            display: flex;
            overflow: hidden;
            position: relative;
            background-color: #000000;
            border-radius: 8px;
        }

        .bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: bold;
            transition: width 0.4s ease;
        }

        .bar-separator {
            width: 10px;
            background-color: #13b467;
            height: 100%;
            box-shadow: 0 0 20px #13b467;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        /* --- CHAUDS & FROIDS ANIMATIONS DYNAMIQUES --- */
        .hot-cold-section {
            padding: 30px 20px;
            background: #000000;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-bottom: 4px solid #1a1a1a;
            flex-shrink: 0;
            align-items: center;
        }

        .hc-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 40px;
        }

        .hc-label {
            font-size: 4rem;
            width: 70px;
            text-align: center;
        }

        .hc-numbers {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex: 1;
        }

        .hc-ball {
            width: 110px; /* Agrandissement XXL */
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Animations de halos Feu & Glace */
        @keyframes fireGlow {
            0% { box-shadow: 0 0 15px #ff4500, inset 0 0 20px rgba(0,0,0,0.6); transform: scale(1); }
            50% { box-shadow: 0 0 35px #ff8c00, inset 0 0 15px rgba(0,0,0,0.4); transform: scale(1.04); border-color: #ff5500; }
            100% { box-shadow: 0 0 15px #ff4500, inset 0 0 20px rgba(0,0,0,0.6); transform: scale(1); }
        }

        @keyframes iceGlow {
            0% { box-shadow: 0 0 15px #00ffff, inset 0 0 20px rgba(0,0,0,0.6); transform: scale(1); }
            50% { box-shadow: 0 0 35px #00bfff, inset 0 0 15px rgba(0,0,0,0.4); transform: scale(1.04); border-color: #00e5ff; }
            100% { box-shadow: 0 0 15px #00ffff, inset 0 0 20px rgba(0,0,0,0.6); transform: scale(1); }
        }

        .hot-glow {
            animation: fireGlow 1.8s infinite ease-in-out;
        }

        .cold-glow {
            animation: iceGlow 1.8s infinite ease-in-out;
        }

        /* --- TACTILE KEYPAD INTERFACE XXL --- */
        .embedded-keypad {
            flex: 1;
            background-color: #000000;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .key-btn {
            height: 85px; /* Boutons de saisie géants */
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .key-btn:active {
            transform: scale(0.94);
        }

        .keypad-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .ctrl-btn {
            height: 80px;
            font-family: Arial, sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Couleurs Thématiques */
        .c-red { color: var(--casino-red); }
        .c-black { color: #ffffff; }
        .c-green { color: var(--casino-green); }
        
        .bg-red { background: linear-gradient(to bottom, #e52d2d, #a31515); }
        .bg-black { background: linear-gradient(to bottom, #242528, #111113); }
        .bg-green { background: linear-gradient(to bottom, #13b467, #0b7340); }
        .bg-orange { background: linear-gradient(to bottom, #f59e0b, #d97706); }
        .bg-blue { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); }
        .bg-dark-gray { background: #374151; }
        .bg-dark-red { background: #991b1b; }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <span class="brand-name">CASINO COMPAN</span>
        </div>
        <div class="croupier-box">
            <span>CROUPIER :</span><br>
            <span class="croupier-name">B. ETHAN</span>
        </div>
        <div class="table-badge">TABLE N°1</div>
    </header>

    <div class="main-layout">
        
        <div class="left-sidebar">
            <div class="current-number-box" id="mainDisplayBox">-</div>
            <div class="history-rows-container" id="historyContainer"></div>
        </div>

        <div class="right-content">
            
            <div class="roulette-ribbon-container">
                <div class="ribbon-viewport">
                    <div class="ribbon-wheel-track" id="wheelRibbon"></div>
                </div>
                <div class="ball-overlay"></div>
            </div>

            <div class="stats-section">
                <!-- ROUGE / VERT / NOIR -->
                <div>
                    <div class="dynamic-stat-labels">
                        <div class="lbl-left" id="lbl-red-side">ROUGE</div>
                        <div class="lbl-mid" id="lbl-red-mid">VERT</div>
                        <div class="lbl-right" id="lbl-red-right">NOIR</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-red" id="bar-red" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-1" style="width: 8px;"></div>
                        <div class="bar-segment bg-black" id="bar-black" style="width: 46%;">0%</div>
                    </div>
                </div>

                <!-- IMPAIR / ZERO / PAIR -->
                <div>
                    <div class="dynamic-stat-labels">
                        <div class="lbl-left" id="lbl-even-side">IMPAIR</div>
                        <div class="lbl-mid" id="lbl-even-mid">ZERO</div>
                        <div class="lbl-right" id="lbl-even-right">PAIR</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-orange" id="bar-odd" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-2" style="width: 8px;"></div>
                        <div class="bar-segment bg-blue" id="bar-even" style="width: 46%;">0%</div>
                    </div>
                </div>
            </div>

            <div class="hot-cold-section">
                <div class="hc-row">
                    <span class="hc-label">🔥</span>
                    <div class="hc-numbers" id="hotNums"></div>
                </div>
                <div class="hc-row">
                    <span class="hc-label">❄️</span>
                    <div class="hc-numbers" id="coldNums"></div>
                </div>
            </div>

            <div class="embedded-keypad">
                <div class="keypad-grid" id="gridButtons"></div>
                
                <div class="keypad-controls">
                    <button class="ctrl-btn bg-dark-gray" onclick="undoLast()">Retour (Undo)</button>
                    <button class="ctrl-btn bg-dark-red" onclick="clearAll()">Effacer Tout</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Ordre réel européen du cylindre
        var layoutOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        var redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        var historyData = [];

        function getNumberColor(num) {
            if (num === 0) return 'green';
            return redNumbers.indexOf(num) !== -1 ? 'red' : 'black';
        }

        function getButtonClass(num) {
            if (num === 0) return 'bg-green';
            return redNumbers.indexOf(num) !== -1 ? 'bg-red' : 'bg-black';
        }

        function init() {
            buildEmbeddedGrid();
            buildStaticRibbon();
            updateDashboard();
        }

        function buildEmbeddedGrid() {
            var grid = document.getElementById('gridButtons');
            grid.innerHTML = '';
            
            var btnZero = document.createElement('div');
            btnZero.className = 'key-btn bg-green';
            btnZero.textContent = '0';
            btnZero.onclick = function() { selectNumber(0); };
            grid.appendChild(btnZero);

            for(var i = 1; i <= 36; i++) {
                (function(num) {
                    var btn = document.createElement('div');
                    btn.className = 'key-btn ' + getButtonClass(num);
                    btn.textContent = num;
                    btn.onclick = function() { selectNumber(num); };
                    grid.appendChild(btn);
                })(i);
            }
        }

        function buildStaticRibbon() {
            var ribbon = document.getElementById('wheelRibbon');
            ribbon.style.transition = 'none';
            ribbon.style.left = '0px';
            
            // Centrage initial par défaut sur le 0
            var htmlContent = '';
            var targetIdx = 0; // Index du 0
            for (var i = -2; i <= 2; i++) {
                var currentIdx = (targetIdx + i + 37) % 37;
                var num = layoutOrder[currentIdx];
                var activeClass = i === 0 ? 'active-pocket' : '';
                htmlContent += '<div class="ribbon-pocket ' + getButtonClass(num) + ' ' + activeClass + '">' + num + '</div>';
            }
            ribbon.innerHTML = htmlContent;
            // Aligner parfaitement le milieu de la case centrale au milieu du viewport
            ribbon.style.transform = 'translateX(0px)';
        }

        function selectNumber(num) {
            historyData.push(num);
            animateRibbonTo(num);
            updateDashboard();
        }

        function animateRibbonTo(targetNum) {
            var ribbon = document.getElementById('wheelRibbon');
            var targetIdx = layoutOrder.indexOf(targetNum);
            
            // On prépare le carrousel avec le numéro cible au milieu exact (index 2 sur 5 visibles)
            var htmlContent = '';
            for (var i = -2; i <= 2; i++) {
                var currentIdx = (targetIdx + i + 37) % 37;
                var num = layoutOrder[currentIdx];
                var activeClass = i === 0 ? 'active-pocket' : '';
                htmlContent += '<div class="ribbon-pocket ' + getButtonClass(num) + ' ' + activeClass + '">' + num + '</div>';
            }
            
            ribbon.style.transition = 'none';
            ribbon.innerHTML = htmlContent;
            
            // Effet d'impulsion/glissement rapide de gauche à droite
            ribbon.style.transform = 'translateX(-150px)';
            
            setTimeout(function() {
                ribbon.style.transition = 'transform 0.45s cubic-bezier(0.1, 0.8, 0.2, 1)';
                ribbon.style.transform = 'translateX(0px)';
            }, 20);
        }

        function undoLast() {
            historyData.pop();
            var last = historyData[historyData.length - 1];
            if (last !== undefined) animateRibbonTo(last);
            else buildStaticRibbon();
            updateDashboard();
        }

        function clearAll() {
            historyData = [];
            buildStaticRibbon();
            updateDashboard();
        }

        function updateDashboard() {
            var mainBox = document.getElementById('mainDisplayBox');
            
            if (historyData.length > 0) {
                var last = historyData[historyData.length - 1];
                mainBox.textContent = last;
                if(getNumberColor(last) === 'red') mainBox.style.color = 'var(--casino-red)';
                else if(getNumberColor(last) === 'black') mainBox.style.color = '#ffffff';
                else mainBox.style.color = 'var(--casino-green)';
            } else {
                mainBox.textContent = '-';
                mainBox.style.color = '#ffffff';
            }

            renderSplitHistory();
            calculateStats();
            updateHotCold();
        }

        function renderSplitHistory() {
            var container = document.getElementById('historyContainer');
            container.innerHTML = '';
            
            var recent = historyData.slice().reverse();

            recent.forEach(function(num) {
                if (num === 0) {
                    container.innerHTML += '<div class="history-line zero-line"><div class="hist-cell c-green">' + num + '</div></div>';
                } else {
                    var color = getNumberColor(num);
                    if (color === 'red') {
                        container.innerHTML += '<div class="history-line"><div class="hist-cell c-red">' + num + '</div><div class="hist-cell empty">-</div></div>';
                    } else {
                        container.innerHTML += '<div class="history-line"><div class="hist-cell empty">-</div><div class="hist-cell c-black">' + num + '</div></div>';
                    }
                }
            });

            container.scrollTop = 0;
        }

        function updateHotCold() {
            var hotContainer = document.getElementById('hotNums');
            var coldContainer = document.getElementById('coldNums');
            
            if (historyData.length === 0) {
                hotContainer.innerHTML = '<span style="color:#444; font-size:2rem;">En attente de données...</span>';
                coldContainer.innerHTML = '<span style="color:#444; font-size:2rem;">En attente de données...</span>';
                return;
            }

            var frequencies = [];
            for (var i = 0; i < 37; i++) { frequencies.push({ num: i, count: 0 }); }
            historyData.forEach(function(num) { frequencies[num].count++; });

            var activeSort = frequencies.filter(function(f) { return f.count > 0; });
            
            var hotSorted = activeSort.slice().sort(function(a, b) { 
                return b.count - a.count || b.num - a.num; 
            });
            var coldSorted = activeSort.slice().sort(function(a, b) { 
                return a.count - b.count || a.num - b.num; 
            });

            // Injection avec la classe d'animation correspondante (Feu ou Glace)
            hotContainer.innerHTML = hotSorted.slice(0, 4).map(function(f) { 
                return '<div class="hc-ball hot-glow ' + getButtonClass(f.num) + '">' + f.num + '</div>';
            }).join('');

            coldContainer.innerHTML = coldSorted.slice(0, 4).map(function(f) { 
                return '<div class="hc-ball cold-glow ' + getButtonClass(f.num) + '">' + f.num + '</div>';
            }).join('');
        }

        function calculateStats() {
            var total = historyData.length;
            
            if (total === 0) {
                // Config par défaut à vide
                updateLabelLayout('red', 46, 8, 46);
                updateLabelLayout('even', 46, 8, 46);
                
                document.getElementById('bar-red').style.width = "46%"; document.getElementById('bar-red').textContent = "0%";
                document.getElementById('bar-black').style.width = "46%"; document.getElementById('bar-black').textContent = "0%";
                document.getElementById('sep-zero-1').style.width = "8px"; document.getElementById('sep-zero-1').textContent = "";
                
                document.getElementById('bar-odd').style.width = "46%"; document.getElementById('bar-odd').textContent = "0%";
                document.getElementById('bar-even').style.width = "46%"; document.getElementById('bar-even').textContent = "0%";
                document.getElementById('sep-zero-2').style.width = "8px"; document.getElementById('sep-zero-2').textContent = "";
                return;
            }

            var red = 0, black = 0, zero = 0, odd = 0, even = 0;

            historyData.forEach(function(num) {
                if (num === 0) { zero++; } 
                else {
                    if (redNumbers.indexOf(num) !== -1) red++; else black++;
                    if (num % 2 !== 0) odd++; else even++;
                }
            });

            var pRed = Math.round((red / total) * 100);
            var pBlack = Math.round((black / total) * 100);
            var pZero = Math.round((zero / total) * 100);
            var pOdd = Math.round((odd / total) * 100);
            var pEven = Math.round((even / total) * 100);

            // Ajustement dynamique des tailles des séparateurs
            var sepWidth1 = pZero > 0 ? pZero : 2; 
            var sepWidth2 = pZero > 0 ? pZero : 2; 

            // Rééquilibrage visuel pour que la somme fasse 100%
            var totalRedRow = pRed + pBlack + pZero;
            if(totalRedRow !== 100 && totalRedRow > 0) { pBlack += (100 - totalRedRow); }
            var totalEvenRow = pOdd + pEven + pZero;
            if(totalEvenRow !== 100 && totalEvenRow > 0) { pEven += (100 - totalEvenRow); }

            // Attribution des largeurs aux barres graphiques
            document.getElementById('bar-red').style.width = pRed + '%';
            document.getElementById('bar-red').textContent = pRed + '%';
            document.getElementById('bar-black').style.width = pBlack + '%';
            document.getElementById('bar-black').textContent = pBlack + '%';
            
            var sep1 = document.getElementById('sep-zero-1');
            sep1.style.width = sepWidth1 + '%';
            sep1.textContent = pZero > 0 ? pZero + '%' : '';

            document.getElementById('bar-odd').style.width = pOdd + '%';
            document.getElementById('bar-odd').textContent = pOdd + '%';
            document.getElementById('bar-even').style.width = pEven + '%';
            document.getElementById('bar-even').textContent = pEven + '%';

            var sep2 = document.getElementById('sep-zero-2');
            sep2.style.width = sepWidth2 + '%';
            sep2.textContent = pZero > 0 ? pZero + '%' : '';

            // Synchronisation de la largeur des en-têtes textuels pour suivre le mouvement vert de la roulette
            updateLabelLayout('red', pRed, sepWidth1, pBlack);
            updateLabelLayout('even', pOdd, sepWidth2, pEven);
        }

        function updateLabelLayout(prefix, leftW, midW, rightW) {
            document.getElementById('lbl-' + prefix + '-side').style.width = leftW + '%';
            document.getElementById('lbl-' + prefix + '-mid').style.width = midW + '%';
            document.getElementById('lbl-' + prefix + '-right').style.width = rightW + '%';
        }

        window.onload = init;
    </script>
</body>
</html>
