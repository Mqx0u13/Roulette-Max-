<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Casino Compan - Live Board</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-texture: #141416;
            --casino-red: #d61c1c;
            --casino-black: #17181c;
            --casino-green: #0b9351;
            --text-gold: #d4af37;
            --warning-yellow: #facc15;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- EN-TÊTE --- */
        header {
            background: linear-gradient(to bottom, #111, #000);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            height: 75px;
            flex-shrink: 0;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-e {
            color: var(--text-gold);
            font-size: 1.8rem;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
        }

        .brand-name {
            font-size: 1.1rem;
            letter-spacing: 3px;
            font-weight: bold;
            color: #fff;
        }

        .sub-brand {
            font-size: 0.85rem;
            font-family: Arial, sans-serif;
            color: var(--text-gold);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .croupier-box {
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            color: #ddd;
            font-weight: bold;
        }

        .croupier-name {
            color: #fff;
            font-family: 'Impact', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 1.5px;
        }

        /* --- MAIN LAYOUT --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- HISTORIQUE (GAUCHE) --- */
        .left-sidebar {
            width: 30%;
            background-color: var(--panel-texture);
            border-right: 3px solid #2d2d30;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .current-number-box {
            background-color: #111317;
            border: 3px solid #3a3a40;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            flex-shrink: 0;
            font-size: 5.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .history-rows-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
        }

        .history-line {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            align-items: center;
        }

        .history-line.zero-line {
            display: block;
            text-align: center;
        }

        .hist-cell {
            font-size: 2.3rem;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .hist-cell.empty {
            visibility: hidden;
        }

        /* --- CONTENU DROIT --- */
        .right-content {
            width: 70%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- CYLINDRE ANIMÉ DE FILANTE (EN HAUT) --- */
        .roulette-ribbon-container {
            height: 160px;
            background: #000;
            border-bottom: 3px solid #2d2d30;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ribbon-viewport {
            width: 360px; /* Largeur de 3 cases côte à côte */
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .ribbon-wheel-track {
            display: flex;
            align-items: center;
            position: relative;
            left: 0;
            transition: left 0.6s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .ribbon-pocket {
            width: 110px;
            height: 110px;
            margin: 0 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
            flex-shrink: 0;
        }

        .ribbon-pocket.active-pocket {
            border: 4px solid #fff;
            transform: scale(1.02);
        }

        .ball-overlay {
            position: absolute;
            bottom: 12px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #fff, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 6px #fff;
            z-index: 10;
        }

        /* --- STATISTIQUES AGRANDIES --- */
        .stats-section {
            background-color: #0b0d13;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
        }

        .stat-row-label {
            display: flex;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #d1d5db;
            padding: 0 5px;
            margin-bottom: 4px;
        }

        .bar-wrapper {
            height: 55px; /* Épaisseur renforcée comme sur l'image */
            border: 3px solid #222;
            display: flex;
            overflow: hidden;
            position: relative;
            background-color: #111;
            border-radius: 4px;
        }

        .bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            transition: width 0.4s ease;
        }

        .bar-separator {
            width: 10px;
            background-color: #13b467;
            height: 100%;
            box-shadow: 0 0 12px #13b467;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        /* --- SECTION CHAUDS & FROIDS EN BAS DES STATS --- */
        .hot-cold-section {
            padding: 10px 20px;
            background: #0b0d13;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 2px solid #222;
            flex-shrink: 0;
        }

        .hc-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hc-label {
            font-size: 1.4rem;
            width: 30px;
            text-align: center;
        }

        .hc-numbers {
            display: flex;
            gap: 8px;
        }

        .hc-ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
        }

        /* --- GRILLE DE SAISIE FIXE --- */
        .embedded-keypad {
            flex: 1;
            background-color: #0d0f14;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .key-btn {
            height: 46px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .keypad-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }

        .ctrl-btn {
            height: 44px;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            border-radius: 6px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* --- PRÉVENTION --- */
        .prevention-banner {
            background-color: var(--warning-yellow);
            color: #000;
            padding: 6px 12px;
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            border-top: 2px solid #b45309;
            flex-shrink: 0;
            line-height: 1.3;
        }

        /* Couleurs */
        .c-red { color: var(--casino-red); }
        .c-black { color: #ffffff; }
        .c-green { color: var(--casino-green); }
        
        .bg-red { background: linear-gradient(to bottom, #e52d2d, #a31515); }
        .bg-black { background: linear-gradient(to bottom, #2c2d30, #17181c); }
        .bg-green { background: linear-gradient(to bottom, #13b467, #0b7340); }
        .bg-orange { background: linear-gradient(to bottom, #f59e0b, #d97706); }
        .bg-blue { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); }
        .bg-dark-gray { background: #374151; }
        .bg-dark-red { background: #991b1b; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="brand-logo">
            <span class="logo-e">E</span>
            <span class="brand-name">CASINO COMPAN</span>
            <span class="sub-brand">Ethan Casino</span>
        </div>
        <div class="croupier-box">
            <span>CROUPIER :</span><br>
            <span class="croupier-name">B. ETHAN</span>
        </div>
        <div style="width: 140px;"></div>
    </header>

    <div class="main-layout">
        
        <!-- SIDEBAR GAUCHE (HISTORIQUE) -->
        <div class="left-sidebar">
            <div class="current-number-box" id="mainDisplayBox">-</div>
            <div class="history-rows-container" id="historyContainer"></div>
        </div>

        <!-- CÔTÉ DROIT -->
        <div class="right-content">
            
            <!-- CYLINDRE VISUEL EN HAUT -->
            <div class="roulette-ribbon-container">
                <div class="ribbon-viewport">
                    <div class="ribbon-wheel-track" id="wheelRibbon">
                        <!-- Généré dynamiquement pour défilement -->
                    </div>
                </div>
                <div class="ball-overlay"></div>
            </div>

            <!-- SECTION STATISTIQUES ÉPAISSES -->
            <div class="stats-section">
                <div>
                    <div class="stat-row-label">
                        <span>ROUGE</span>
                        <span>ZERO</span>
                        <span>NOIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-red" id="bar-red" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-1" style="width: 8px;"></div>
                        <div class="bar-segment bg-black" id="bar-black" style="width: 46%;">0%</div>
                    </div>
                </div>

                <div>
                    <div class="stat-row-label">
                        <span>IMPAIR</span>
                        <span>ZERO</span>
                        <span>PAIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-orange" id="bar-odd" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-2" style="width: 8px;"></div>
                        <div class="bar-segment bg-blue" id="bar-even" style="width: 46%;">0%</div>
                    </div>
                </div>
            </div>

            <!-- SECTION CHAUDS & FROIDS (SOUS LES STATS) -->
            <div class="hot-cold-section">
                <div class="hc-row">
                    <span class="hc-label">🔥</span>
                    <div class="hc-numbers" id="hotNums"></div>
                </div>
                <div class="hc-row">
                    <span class="hc-label">❄️</span>
                    <div class="hc-numbers" id="coldNums"></div>
                </div>
            </div>

            <!-- GRILLE DE SAISIE RECENTRÉE -->
            <div class="embedded-keypad">
                <div class="keypad-grid" id="gridButtons"></div>
                
                <div class="keypad-controls">
                    <button class="ctrl-btn bg-dark-gray" onclick="undoLast()">Retour (Undo)</button>
                    <button class="ctrl-btn bg-dark-red" onclick="clearAll()">Effacer Tout</button>
                </div>
            </div>

            <!-- BANDEAU DE PRÉVENTION -->
            <div class="prevention-banner">
                ⚠️ LES JEUX D'ARGENT ET DE HASARD PEUVENT ÊTRE DANGEREUX : PERTES D'ARGENT, CONFLITS FAMILIAUX, ADDICTION... RETROUVEZ NOS CONSEILS SUR JOUEURS-INFO-SERVICE.FR (09 74 75 13 13)
            </div>

        </div>
    </div>

    <script>
        // Ordre réel complet du cylindre européen répliqué pour l'effet infini
        const layoutOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        let history = [];

        function getNumberColor(num) {
            if (num === 0) return 'green';
            return redNumbers.includes(num) ? 'red' : 'black';
        }

        function getButtonClass(num) {
            if (num === 0) return 'bg-green';
            return redNumbers.includes(num) ? 'bg-red' : 'bg-black';
        }

        function init() {
            buildEmbeddedGrid();
            buildStaticRibbon();
            updateDashboard();
        }

        function buildEmbeddedGrid() {
            const grid = document.getElementById('gridButtons');
            grid.innerHTML = '';
            
            const btnZero = document.createElement('div');
            btnZero.className = 'key-btn bg-green';
            btnZero.textContent = '0';
            btnZero.onclick = () => selectNumber(0);
            grid.appendChild(btnZero);

            for(let i = 1; i <= 36; i++) {
                const btn = document.createElement('div');
                btn.className = `key-btn ${getButtonClass(i)}`;
                btn.textContent = i;
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            }
        }

        // Crée la bande initiale neutre du cylindre
        function buildStaticRibbon() {
            const ribbon = document.getElementById('wheelRibbon');
            ribbon.style.transition = 'none';
            ribbon.style.left = '0px';
            ribbon.innerHTML = `
                <div class="ribbon-pocket bg-black">-</div>
                <div class="ribbon-pocket bg-green active-pocket">0</div>
                <div class="ribbon-pocket bg-black">-</div>
            `;
        }

        function selectNumber(num) {
            history.push(num);
            animateRibbonTo(num);
            updateDashboard();
        }

        // Animation de défilement rapide de droite à gauche
        function animateRibbonTo(targetNum) {
            const ribbon = document.getElementById('wheelRibbon');
            const targetIdx = layoutOrder.indexOf(targetNum);
            
            // On extrait 8 numéros consécutifs du cylindre pour créer l'effet de défilement rapide
            let htmlContent = '';
            for (let i = 0; i < 7; i++) {
                let currentIdx = (targetIdx + i) % 37;
                let num = layoutOrder[currentIdx];
                let activeClass = i === 0 ? 'active-pocket' : '';
                htmlContent += `<div class="ribbon-pocket ${getButtonClass(num)} ${activeClass}">${num}</div>`;
            }
            
            ribbon.style.transition = 'none';
            ribbon.innerHTML = htmlContent;
            
            // Décale le ruban vers la droite instantanément, puis anime vers la gauche
            ribbon.style.left = '400px';
            
            setTimeout(() => {
                ribbon.style.transition = 'left 0.5s cubic-bezier(0.1, 0.7, 0.1, 1)';
                ribbon.style.left = '0px';
            }, 20);
        }

        function undoLast() {
            history.pop();
            const last = history[history.length - 1];
            if (last !== undefined) animateRibbonTo(last);
            else buildStaticRibbon();
            updateDashboard();
        }

        function clearAll() {
            history = [];
            buildStaticRibbon();
            updateDashboard();
        }

        function updateDashboard() {
            const mainBox = document.getElementById('mainDisplayBox');
            
            if (history.length > 0) {
                const last = history[history.length - 1];
                mainBox.textContent = last;
                
                if(getNumberColor(last) === 'red') mainBox.style.color = 'var(--casino-red)';
                else if(getNumberColor(last) === 'black') mainBox.style.color = '#ffffff';
                else mainBox.style.color = 'var(--casino-green)';
            } else {
                mainBox.textContent = '-';
                mainBox.style.color = '#ffffff';
            }

            renderSplitHistory();
            calculateStats();
            updateHotCold();
        }

        function renderSplitHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            const recent = [...history].reverse().slice(0, 10);

            recent.forEach(num => {
                if (num === 0) {
                    container.innerHTML += `
                        <div class="history-line zero-line">
                            <div class="hist-cell c-green">${num}</div>
                        </div>`;
                } else {
                    const color = getNumberColor(num);
                    if (color === 'red') {
                        container.innerHTML += `
                            <div class="history-line">
                                <div class="hist-cell c-red">${num}</div>
                                <div class="hist-cell empty">-</div>
                            </div>`;
                    } else {
                        container.innerHTML += `
                            <div class="history-line">
                                <div class="hist-cell empty">-</div>
                                <div class="hist-cell c-black">${num}</div>
                            </div>`;
                    }
                }
            });
        }

        function updateHotCold() {
            const hotContainer = document.getElementById('hotNums');
            const coldContainer = document.getElementById('coldNums');
            
            if (history.length === 0) {
                hotContainer.innerHTML = '<span style="color:#555; font-size:0.9rem; font-family:sans-serif;">En attente...</span>';
                coldContainer.innerHTML = '<span style="color:#555; font-size:0.9rem; font-family:sans-serif;">En attente...</span>';
                return;
            }

            const frequencies = Array.from({ length: 37 }, (_, i) => ({ num: i, count: 0 }));
            history.forEach(num => { frequencies[num].count++; });

            const activeSort = [...frequencies].filter(f => f.count > 0);
            
            const hotSorted = [...activeSort].sort((a, b) => b.count - a.count || b.num - a.num);
            const coldSorted = [...activeSort].sort((a, b) => a.count - b.count || a.num - b.num);

            hotContainer.innerHTML = hotSorted.slice(0, 4).map(f => 
                `<div class="hc-ball ${getButtonClass(f.num)}">${f.num}</div>`
            ).join('');

            coldContainer.innerHTML = coldSorted.slice(0, 4).map(f => 
                `<div class="hc-ball ${getButtonClass(f.num)}">${f.num}</div>`
            ).join('');
        }

        function calculateStats() {
            const total = history.length;
            
            if (total === 0) {
                document.getElementById('bar-red').style.width = "46%"; document.getElementById('bar-red').textContent = "0%";
                document.getElementById('bar-black').style.width = "46%"; document.getElementById('bar-black').textContent = "0%";
                document.getElementById('sep-zero-1').style.width = "8px"; document.getElementById('sep-zero-1').textContent = "";
                
                document.getElementById('bar-odd').style.width = "46%"; document.getElementById('bar-odd').textContent = "0%";
                document.getElementById('bar-even').style.width = "46%"; document.getElementById('bar-even').textContent = "0%";
                document.getElementById('sep-zero-2').style.width = "8px"; document.getElementById('sep-zero-2').textContent = "";
                return;
            }

            let red = 0, black = 0, zero = 0, odd = 0, even = 0;

            history.forEach(num => {
                if (num === 0) {
                    zero++;
                } else {
                    if (redNumbers.includes(num)) red++;
                    else black++;

                    if (num % 2 !== 0) odd++;
                    else even++;
                }
            });

            const pRed = Math.round((red / total) * 100);
            const pBlack = Math.round((black / total) * 100);
            const pZero = Math.round((zero / total) * 100);
            const pOdd = Math.round((odd / total) * 100);
            const pEven = Math.round((even / total) * 100);

            document.getElementById('bar-red').style.width = pRed > 0 ? `${pRed}%` : '0%';
            document.getElementById('bar-red').textContent = `${pRed}%`;
            document.getElementById('bar-black').style.width = pBlack > 0 ? `${pBlack}%` : '0%';
            document.getElementById('bar-black').textContent = `${pBlack}%`;
            
            const sep1 = document.getElementById('sep-zero-1');
            if (pZero > 0) { sep1.style.width = `${pZero}%`; sep1.textContent = `${pZero}%`; } 
            else { sep1.style.width = '10px'; sep1.textContent = ''; }

            document.getElementById('bar-odd').style.width = pOdd > 0 ? `${pOdd}%` : '0%';
            document.getElementById('bar-odd').textContent = `${pOdd}%`;
            document.getElementById('bar-even').style.width = pEven > 0 ? `${pEven}%` : '0%';
            document.getElementById('bar-even').textContent = `${pEven}%`;

            const sep2 = document.getElementById('sep-zero-2');
            if (pZero > 0) { sep2.style.width = `${pZero}%`; sep2.textContent = `${pZero}%`; } 
            else { sep2.style.width = '10px'; sep2.textContent = ''; }
        }

        window.onload = init;
    </script>
</body>
</html>
