<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-image: url('image_11.png'); /* Image de fond (votre screenshot) */
            background-size: cover;
            background-repeat: no-repeat;
            color: white;
        }

        /* --- En-tête --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.8); /* Fond sombre pour l'en-tête */
        }

        .logo-partouche {
            height: 50px;
            margin-right: 20px;
        }

        .mises-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mise-min-max {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .table-info {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* --- Tableau des numéros --- */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 5px;
            padding: 20px;
            justify-items: center;
        }

        .number-box {
            width: 40px;
            height: 40px;
            border: 2px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .number-box.red {
            background-color: #ff0000;
        }

        .number-box.black {
            background-color: #000000;
        }

        .number-box.green {
            background-color: #00ff00;
        }

        /* --- Zone de texte et boutons --- */
        .input-container {
            display: flex;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .result-input {
            width: 50px;
            height: 40px;
            border: 2px solid white;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-right: 10px;
        }

        .effacer-tout-btn, .retour-undo-btn {
            padding: 10px 20px;
            border: 2px solid white;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }

        .effacer-tout-btn {
            background-color: #ff0000;
        }

        .retour-undo-btn {
            background-color: #0000ff;
        }

        /* --- Conteneur principal --- */
        .main-container {
            padding-right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/31/Partouche-logo.png" alt="Logo Partouche" class="logo-partouche">
        <div class="mises-container">
            <div class="mise-min-max">Mise Min 2€</div>
            <div class="mise-min-max">Mise Max 40€</div>
        </div>
        <div class="table-info">AR 67</div>
    </div>

    <div class="main-container">
        <div class="input-container">
            <input type="text" id="resultInput" class="result-input" placeholder="" maxlength="2">
            <button class="effacer-tout-btn">Effacer Tout</button>
            <button class="retour-undo-btn">Retour (Undo)</button>
        </div>

        <div class="numbers-grid">
            <div class="number-box green">0</div>
            <div class="number-box red">1</div>
            <div class="number-box black">2</div>
            <div class="number-box red">3</div>
            <div class="number-box black">4</div>
            <div class="number-box red">5</div>
            <div class="number-box black">6</div>
            <div class="number-box red">7</div>
            <div class="number-box black">8</div>
            <div class="number-box red">9</div>
            <div class="number-box black">10</div>
            <div class="number-box black">11</div>
            <div class="number-box red">12</div>
            <div class="number-box black">13</div>
            <div class="number-box red">14</div>
            <div class="number-box black">15</div>
            <div class="number-box red">16</div>
            <div class="number-box black">17</div>
            <div class="number-box red">18</div>
            <div class="number-box red">19</div>
            <div class="number-box black">20</div>
            <div class="number-box red">21</div>
            <div class="number-box black">22</div>
            <div class="number-box red">23</div>
            <div class="number-box black">24</div>
            <div class="number-box red">25</div>
            <div class="number-box black">26</div>
            <div class="number-box red">27</div>
            <div class="number-box black">28</div>
            <div class="number-box black">29</div>
            <div class="number-box red">30</div>
            <div class="number-box black">31</div>
            <div class="number-box red">32</div>
            <div class="number-box black">33</div>
            <div class="number-box red">34</div>
            <div class="number-box black">35</div>
            <div class="number-box red">36</div>
        </div>
    </div>

    <script>
        const resultInput = document.getElementById('resultInput');
        const effacerToutBtn = document.querySelector('.effacer-tout-btn');
        const retourUndoBtn = document.querySelector('.retour-undo-btn');

        // Fonction pour gérer la saisie au clavier
        function handleKeyboardInput(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const numero = resultInput.value;
                if (numero !== '') {
                    // Ici, vous pouvez ajouter votre logique pour traiter le numéro
                    console.log('Numéro saisi :', numero);
                    resultInput.value = '';
                }
            }
        }

        // Écouter l'événement 'keydown' sur la zone de texte
        resultInput.addEventListener('keydown', handleKeyboardInput);

        // Autres écouteurs d'événements pour les boutons
        effacerToutBtn.addEventListener('click', () => {
            // Logique pour effacer tout
            console.log('Effacer Tout cliqué');
            resultInput.value = '';
        });

        retourUndoBtn.addEventListener('click', () => {
            // Logique pour annuler la dernière action
            console.log('Retour (Undo) cliqué');
        });

        // Focaliser la zone de texte par défaut pour une saisie immédiate
        resultInput.focus();
    </script>
</body>
</html>
