<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ethan Casino - Live Board</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-texture: #141416;
            --casino-red: #d61c1c;
            --casino-black: #17181c;
            --casino-green: #0b9351;
            --text-gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- EN-TÊTE PERSONNALISÉ --- */
        header {
            background: linear-gradient(to bottom, #111, #000);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            height: 75px;
            flex-shrink: 0;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-b {
            color: var(--text-gold);
            font-size: 1.6rem;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
        }

        .brand-name {
            font-size: 1.3rem;
            letter-spacing: 4px;
            font-weight: bold;
            color: #fff;
        }

        .limits-box {
            text-align: right;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            color: #aaa;
            font-weight: bold;
        }

        .limits-box span {
            color: #fff;
            font-size: 1.1rem;
        }

        /* --- CONFIGURATION PANNEAUX --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- HISTORIQUE PRO (GAUCHE) --- */
        .left-sidebar {
            width: 30%;
            background-color: var(--panel-texture);
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 4px 4px;
            border-right: 3px solid #2d2d30;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .current-number-box {
            background-color: #111317;
            border: 3px solid #3a3a40;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .current-number-box span {
            font-size: 6rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .history-grid-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow-y: auto;
            align-content: start;
            row-gap: 6px;
        }

        .hist-cell {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            line-height: 1;
        }

        .hist-cell.empty {
            visibility: hidden;
        }

        /* --- VISUEL & TAPIS SAISIE (DROITE) --- */
        .right-content {
            width: 70%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Le Cylindre horizontal du haut */
        .roulette-ribbon-container {
            height: 160px;
            background: #000;
            border-bottom: 3px solid #2d2d30;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ribbon-wheel-track {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ribbon-pocket {
            width: 110px;
            height: 110px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .ribbon-pocket.active-pocket {
            border: 4px solid #fff;
            transform: scale(1.05);
        }

        .ball-overlay {
            position: absolute;
            bottom: 15px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #fff, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 6px #fff;
            z-index: 10;
        }

        /* Panneau Statistiques */
        .stats-section {
            background-color: #0b0d13;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .stat-row-label {
            display: flex;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #d1d5db;
            padding: 0 5px;
        }

        .bar-wrapper {
            height: 40px;
            border: 2px solid #222;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            transition: width 0.5s ease;
        }

        .bar-separator {
            width: 6px;
            background-color: #00ff00;
            height: 100%;
            box-shadow: 0 0 10px #00ff00;
        }

        /* --- GRILLE DE SAISIE FIXE EN BAS --- */
        .embedded-keypad {
            flex: 1;
            background-color: #0d0f14;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 2px solid #222;
            overflow-y: auto;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* 7 colonnes pour rester compact en hauteur */
            gap: 6px;
        }

        .key-btn {
            height: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .key-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .keypad-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 2px;
        }

        .ctrl-btn {
            height: 45px;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            border-radius: 6px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Couleurs Thèmes */
        .c-red { color: var(--casino-red); }
        .c-black { color: #ffffff; }
        .c-green { color: var(--casino-green); }
        
        .bg-red { background: linear-gradient(to bottom, #e52d2d, #a31515); }
        .bg-black { background: linear-gradient(to bottom, #2c2d30, #17181c); }
        .bg-green { background: linear-gradient(to bottom, #13b467, #0b7340); }
        .bg-orange { background: linear-gradient(to bottom, #f59e0b, #d97706); }
        .bg-blue { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); }
        .bg-dark-gray { background: #374151; }
        .bg-dark-red { background: #991b1b; }
    </style>
</head>
<body>

    <!-- HEADER STYLE CASINO ETHAN -->
    <header>
        <div class="brand-logo">
            <span class="logo-b">E</span>
            <span class="brand-name">ETHAN CASINO</span>
        </div>
        <div class="limits-box">
            MISE MIN: <span>5€</span><br>
            MISE MAX: <span>100€</span>
        </div>
        <div class="limits-box" style="text-align: right; padding-left: 20px;">
            <br><span>AR 32</span>
        </div>
    </header>

    <div class="main-layout">
        
        <!-- SIDEBAR GAUCHE : HISTORIQUE STRICT 2 COLONNES -->
        <div class="left-sidebar">
            <div class="current-number-box" id="mainDisplayBox">
                <span id="lastNumberOut">-</span>
            </div>
            <div class="history-grid-container">
                <div class="history-columns" id="historyContainer">
                    <!-- Généré par JS -->
                </div>
            </div>
        </div>

        <!-- CÔTÉ DROIT : ROULETTE & STATS & GRILLE FIXE -->
        <div class="right-content">
            
            <!-- Bandeau Cylindre Roulette -->
            <div class="roulette-ribbon-container">
                <div class="ribbon-wheel-track" id="wheelRibbon">
                    <div class="ribbon-pocket bg-black">-</div>
                    <div class="ribbon-pocket bg-green active-pocket">-</div>
                    <div class="ribbon-pocket bg-black">-</div>
                </div>
                <div class="ball-overlay"></div>
            </div>

            <!-- Section Graphiques Statistiques -->
            <div class="stats-section">
                <!-- Rouge / Noir -->
                <div>
                    <div class="stat-row-label">
                        <span>ROUGE</span>
                        <span>ZERO</span>
                        <span>NOIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-red" id="bar-red" style="width: 50%;">0%</div>
                        <div class="bar-separator"></div>
                        <div class="bar-segment bg-black" id="bar-black" style="width: 50%;">0%</div>
                    </div>
                </div>

                <!-- Impair / Pair -->
                <div>
                    <div class="stat-row-label">
                        <span>IMPAIR</span>
                        <span>ZERO</span>
                        <span>PAIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-orange" id="bar-odd" style="width: 50%;">0%</div>
                        <div class="bar-separator"></div>
                        <div class="bar-segment bg-blue" id="bar-even" style="width: 50%;">0%</div>
                    </div>
                </div>
            </div>

            <!-- GRILLE DE SAISIE PETITE ET INTEGRÉE DIRECTEMENT EN BAS -->
            <div class="embedded-keypad">
                <div class="keypad-grid" id="gridButtons">
                    <!-- Rempli par le script de 0 à 36 -->
                </div>
                <div class="keypad-controls">
                    <button class="ctrl-btn bg-dark-gray" onclick="undoLast()">Retour (Undo)</button>
                    <button class="ctrl-btn bg-dark-red" onclick="clearAll()">Effacer Tout</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const layoutOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        
        let history = [];

        function getNumberColor(num) {
            if (num === 0) return 'green';
            return redNumbers.includes(num) ? 'red' : 'black';
        }

        function init() {
            buildEmbeddedGrid();
            updateDashboard();
        }

        function buildEmbeddedGrid() {
            const grid = document.getElementById('gridButtons');
            grid.innerHTML = '';
            
            // Le 0 en premier
            const btnZero = document.createElement('div');
            btnZero.className = 'key-btn bg-green';
            btnZero.textContent = '0';
            btnZero.onclick = () => selectNumber(0);
            grid.appendChild(btnZero);

            // Les numéros de 1 à 36
            for(let i = 1; i <= 36; i++) {
                const btn = document.createElement('div');
                const col = getNumberColor(i);
                btn.className = `key-btn ${col === 'red' ? 'bg-red' : 'bg-black'}`;
                btn.textContent = i;
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            }
        }

        function selectNumber(num) {
            history.push(num);
            updateDashboard();
        }

        function undoLast() {
            history.pop();
            updateDashboard();
        }

        function clearAll() {
            history = [];
            updateDashboard();
        }

        function updateDashboard() {
            const lastOutSpan = document.getElementById('lastNumberOut');
            const mainBox = document.getElementById('mainDisplayBox');
            
            if (history.length > 0) {
                const last = history[history.length - 1];
                lastOutSpan.textContent = last;
                
                mainBox.className = 'current-number-box';
                if(getNumberColor(last) === 'red') mainBox.style.color = 'var(--casino-red)';
                else if(getNumberColor(last) === 'black') mainBox.style.color = '#ffffff';
                else mainBox.style.color = 'var(--casino-green)';
                
                updateRibbon(last);
            } else {
                lastOutSpan.textContent = '-';
                mainBox.style.color = '#ffffff';
                resetRibbonBlank();
            }

            renderSplitHistory();
            calculateStats();
        }

        function renderSplitHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';

            // Affiche les 12 derniers numéros saisis
            const recent = [...history].reverse().slice(0, 12);

            recent.forEach(num => {
                const color = getNumberColor(num);
                
                if (color === 'red') {
                    container.innerHTML += `<div class="hist-cell c-red">${num}</div>`;
                    container.innerHTML += `<div class="hist-cell empty">-</div>`;
                } else {
                    const textClass = color === 'green' ? 'c-green' : 'c-black';
                    container.innerHTML += `<div class="hist-cell empty">-</div>`;
                    container.innerHTML += `<div class="hist-cell ${textClass}">${num}</div>`;
                }
            });
        }

        function updateRibbon(currentNum) {
            const ribbon = document.getElementById('wheelRibbon');
            const idx = layoutOrder.indexOf(currentNum);
            
            const prevIdx = (idx - 1 + 37) % 37;
            const nextIdx = (idx + 1) % 37;
            
            const prevNum = layoutOrder[prevIdx];
            const nextNum = layoutOrder[nextIdx];

            ribbon.innerHTML = `
                <div class="ribbon-pocket ${getNumberColor(prevNum) === 'red' ? 'bg-red' : (prevNum === 0 ? 'bg-green' : 'bg-black')}">${prevNum}</div>
                <div class="ribbon-pocket ${getNumberColor(currentNum) === 'red' ? 'bg-red' : (currentNum === 0 ? 'bg-green' : 'bg-black')} active-pocket">${currentNum}</div>
                <div class="ribbon-pocket ${getNumberColor(nextNum) === 'red' ? 'bg-red' : (nextNum === 0 ? 'bg-green' : 'bg-black')}">${nextNum}</div>
            `;
        }

        function resetRibbonBlank() {
            const ribbon = document.getElementById('wheelRibbon');
            ribbon.innerHTML = `
                <div class="ribbon-pocket bg-black">-</div>
                <div class="ribbon-pocket bg-green active-pocket">-</div>
                <div class="ribbon-pocket bg-black">-</div>
            `;
        }

        function calculateStats() {
            if (history.length === 0) {
                document.getElementById('bar-red').style.width = "50%"; document.getElementById('bar-red').textContent = "0%";
                document.getElementById('bar-black').style.width = "50%"; document.getElementById('bar-black').textContent = "0%";
                document.getElementById('bar-odd').style.width = "50%"; document.getElementById('bar-odd').textContent = "0%";
                document.getElementById('bar-even').style.width = "50%"; document.getElementById('bar-even').textContent = "0%";
                return;
            }

            let red = 0, black = 0, odd = 0, even = 0;
            let totalColors = 0, totalParity = 0;

            history.forEach(num => {
                if (num === 0) return; 
                
                if (redNumbers.includes(num)) red++;
                else black++;
                totalColors++;

                if (num % 2 !== 0) odd++;
                else even++;
                totalParity++;
            });

            const pRed = totalColors > 0 ? Math.round((red / totalColors) * 100) : 50;
            const pBlack = totalColors > 0 ? Math.round((black / totalColors) * 100) : 50;
            const pOdd = totalParity > 0 ? Math.round((odd / totalParity) * 100) : 50;
            const pEven = totalParity > 0 ? Math.round((even / totalParity) * 100) : 50;

            document.getElementById('bar-red').style.width = `${pRed}%`;
            document.getElementById('bar-red').textContent = `${pRed}%`;
            document.getElementById('bar-black').style.width = `${pBlack}%`;
            document.getElementById('bar-black').textContent = `${pBlack}%`;

            document.getElementById('bar-odd').style.width = `${pOdd}%`;
            document.getElementById('bar-odd').textContent = `${pOdd}%`;
            document.getElementById('bar-even').style.width = `${pEven}%`;
            document.getElementById('bar-even').textContent = `${pEven}%`;
        }

        window.onload = init;
    </script>
</body>
</html>
