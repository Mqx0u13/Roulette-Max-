<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Casino Compan - Live Board</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-texture: #141416;
            --casino-red: #d61c1c;
            --casino-black: #17181c;
            --casino-green: #0b9351;
            --text-gold: #d4af37;
            --warning-yellow: #facc15;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; font-family: 'Impact', 'Arial Black', sans-serif; }

        body { background-color: var(--bg-dark); color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- EN-TÊTE --- */
        header { background: linear-gradient(to bottom, #111, #000); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; height: 70px; flex-shrink: 0; }
        .brand-logo { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-e { color: var(--text-gold); font-size: 1.5rem; font-family: 'Times New Roman', serif; font-weight: bold; }
        .brand-name { font-size: 1rem; letter-spacing: 2px; }
        .croupier-box { text-align: center; font-family: Arial, sans-serif; font-size: 0.9rem; }
        .croupier-name { color: #fff; font-size: 1.1rem; }

        /* --- LAYOUT --- */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .left-sidebar { width: 30%; background-color: var(--panel-texture); border-right: 3px solid #2d2d30; padding: 10px; display: flex; flex-direction: column; }
        .current-number-box { background: #111; border: 3px solid #3a3a40; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; margin-bottom: 10px; }
        .history-rows-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .history-line { display: grid; grid-template-columns: 1fr 1fr; width: 100%; text-align: center; font-size: 2rem; }
        .zero-line { display: block; color: var(--casino-green); }

        .right-content { width: 70%; display: flex; flex-direction: column; overflow: hidden; }

        /* --- CHAUDS & FROIDS --- */
        .hot-cold-section { padding: 10px; background: #0b0d13; display: flex; flex-direction: column; gap: 5px; }
        .hc-row { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
        .hc-numbers { display: flex; gap: 5px; }
        .hc-ball { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; border: 1px solid #555; }

        /* --- STATS --- */
        .stats-section { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .bar-wrapper { height: 30px; display: flex; border: 1px solid #333; background: #000; }
        .bar-segment { display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: width 0.3s; }

        /* --- KEYPAD --- */
        .embedded-keypad { flex: 1; padding: 10px; overflow-y: auto; }
        .keypad-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .key-btn { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 4px; cursor: pointer; }
        
        /* --- RÈGLES & PRÉVENTION --- */
        .rules-box { font-family: Arial, sans-serif; font-size: 0.8rem; color: #ccc; margin: 10px 0; line-height: 1.4; text-align: center; }
        .prevention-banner { background-color: var(--warning-yellow); color: #000; padding: 5px; font-size: 0.7rem; font-weight: bold; text-align: center; }
        
        .bg-red { background: #d61c1c; } .bg-black { background: #17181c; } .bg-green { background: #0b9351; }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo"><span class="logo-e">E</span><span class="brand-name">CASINO COMPAN</span></div>
        <div class="croupier-box">CROUPIER<br><span class="croupier-name">B. ETHAN</span></div>
    </header>

    <div class="main-layout">
        <div class="left-sidebar">
            <div class="current-number-box" id="mainDisplayBox">-</div>
            <div class="history-rows-container" id="historyContainer"></div>
        </div>

        <div class="right-content">
            <!-- CHAUDS & FROIDS -->
            <div class="hot-cold-section">
                <div class="hc-row"><span>🔥</span><div class="hc-numbers" id="hotNums"></div></div>
                <div class="hc-row"><span>❄️</span><div class="hc-numbers" id="coldNums"></div></div>
            </div>

            <!-- STATS -->
            <div class="stats-section">
                <div class="bar-wrapper"><div class="bar-segment bg-red" id="bar-red" style="width:45%"></div><div class="bar-segment bg-green" id="bar-zero" style="width:10%">0%</div><div class="bar-segment bg-black" id="bar-black" style="width:45%"></div></div>
            </div>

            <div class="embedded-keypad">
                <div class="keypad-grid" id="gridButtons"></div>
                <div class="rules-box">
                    <strong>RÈGLES DE LA ROULETTE - TABLE 1</strong><br>
                    Mise min: 2€ | Plein max: 40€ | Cheval max: 80€<br>
                    Transversale: 120€ | Carré: 160€<br>
                    Colonne/Douzaine: 480€ | Chances simples: 720€
                </div>
            </div>
            
            <div class="prevention-banner">⚠️ JEUX D'ARGENT : RISQUES D'ADDICTION ET PERTES FINANCIÈRES. JOUEURS-INFO-SERVICE.FR</div>
        </div>
    </div>

    <script>
        let history = [];
        const redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        
        function getNumberColor(num) { return num === 0 ? 'bg-green' : (redNumbers.includes(num) ? 'bg-red' : 'bg-black'); }

        function selectNumber(num) { history.push(num); updateAll(); }
        function undoLast() { history.pop(); updateAll(); }

        function updateAll() {
            // Mise à jour Affichage Principal
            const last = history[history.length - 1] || '-';
            document.getElementById('mainDisplayBox').textContent = last;
            
            // Mise à jour Chauds/Froids
            const counts = {}; history.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
            document.getElementById('hotNums').innerHTML = sorted.slice(0,4).map(n => `<div class="hc-ball ${getNumberColor(parseInt(n))}">${n}</div>`).join('');
            document.getElementById('coldNums').innerHTML = sorted.slice(-4).reverse().map(n => `<div class="hc-ball ${getNumberColor(parseInt(n))}">${n}</div>`).join('');

            // Grille Saisie
            const grid = document.getElementById('gridButtons'); grid.innerHTML = '';
            [0, ...Array.from({length:36}, (_,i) => i+1)].forEach(n => {
                const btn = document.createElement('div');
                btn.className = `key-btn ${getNumberColor(n)}`;
                btn.textContent = n;
                btn.onclick = () => selectNumber(n);
                grid.appendChild(btn);
            });
        }
        
        window.onload = updateAll;
    </script>
</body>
</html>
