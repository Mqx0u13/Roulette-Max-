<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Casino Compan - Live Board</title>
    <style>
        :root {
            --bg-dark: #000000; /* Noir OLED Absolu */
            --panel-texture: #000000; /* Noir OLED Absolu */
            --casino-red: #d61c1c;
            --casino-black: #17181c;
            --casino-green: #0b9351;
            --text-gold: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- EN-TÊTE ÉPURÉ --- */
        header {
            background: #000000;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1a1a1a;
            height: 75px;
            flex-shrink: 0;
        }

        .brand-logo .brand-name {
            font-size: 1.8rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: var(--text-gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .croupier-box {
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            color: #ddd;
            font-weight: bold;
        }

        .croupier-name {
            color: #fff;
            font-family: 'Impact', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1.5px;
        }

        .table-badge {
            color: var(--text-gold);
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- LAYOUT GLOBAL --- */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- HISTORIQUE GÉANT (GAUCHE) --- */
        .left-sidebar {
            width: 30%;
            background-color: var(--panel-texture);
            border-right: 3px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            padding: 10px;
            height: 100%;
        }

        .current-number-box {
            background-color: #000000;
            border: 3px solid #222222;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            flex-shrink: 0;
            font-size: 5.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .history-rows-container {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Plus d'espace entre les gros chiffres */
            overflow-y: auto;
            flex: 1;
            padding-bottom: 30px;
        }

        .history-line {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            align-items: center;
            height: 55px; /* Plus haut pour accueillir les gros chiffres */
            flex-shrink: 0;
        }

        .history-line.zero-line {
            display: block;
            text-align: center;
        }

        .hist-cell {
            font-size: 3.5rem; /* Augmenté de 2.3rem à 3.5rem pour remplir l'espace */
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

        .hist-cell.empty {
            visibility: hidden;
        }

        /* --- CONTENU VISUEL & ACTIONS (DROITE) --- */
        .right-content {
            width: 70%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #000000;
        }

        /* --- CYLINDRE INFRA-ROUGE EN HAUT --- */
        .roulette-ribbon-container {
            height: 150px;
            background: #000000;
            border-bottom: 3px solid #1a1a1a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ribbon-viewport {
            width: 360px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .ribbon-wheel-track {
            display: flex;
            align-items: center;
            position: relative;
            left: 0;
        }

        .ribbon-pocket {
            width: 110px;
            height: 110px;
            margin: 0 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            border: 2px solid #222;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
            flex-shrink: 0;
        }

        .ribbon-pocket.active-pocket {
            border: 4px solid #fff;
            transform: scale(1.02);
        }

        .ball-overlay {
            position: absolute;
            bottom: 10px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #fff, #aaa);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 6px #fff;
            z-index: 10;
        }

        /* --- STATISTIQUES GÉANTES --- */
        .stats-section {
            background-color: #000000;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
        }

        .stat-row-label {
            display: flex;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #d1d5db;
            padding: 0 5px;
            margin-bottom: 2px;
        }

        .bar-wrapper {
            height: 75px;
            border: 3px solid #222;
            display: flex;
            overflow: hidden;
            position: relative;
            background-color: #000000;
            border-radius: 6px;
        }

        .bar-segment {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            transition: width 0.4s ease;
        }

        .bar-separator {
            width: 10px;
            background-color: #13b467;
            height: 100%;
            box-shadow: 0 0 15px #13b467;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        /* --- CHAUDS & FROIDS GÉANTS ET CENTRÉS --- */
        .hot-cold-section {
            padding: 20px 20px;
            background: #000000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 3px solid #1a1a1a;
            flex-shrink: 0;
            align-items: center; /* Centre tout le bloc */
        }

        .hc-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; /* Prend toute la largeur */
            gap: 25px;
        }

        .hc-label {
            font-size: 2.5rem; /* Plus gros émoji */
            width: 50px;
            text-align: center;
        }

        .hc-numbers {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex: 1; /* Permet d'occuper l'espace disponible */
        }

        .hc-ball {
            width: 75px; /* Augmenté de 58px à 75px */
            height: 75px; /* Augmenté de 58px à 75px */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem; /* Chiffres à l'intérieur beaucoup plus gros */
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        /* --- CLAVIER NUMÉRIQUE DE SAISIE --- */
        .embedded-keypad {
            flex: 1;
            background-color: #000000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .key-btn {
            height: 48px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .keypad-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .ctrl-btn {
            height: 46px;
            font-family: Arial, sans-serif;
            font-size: 1.05rem;
            font-weight: bold;
            color: #fff;
            border-radius: 6px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Couleurs Thématiques */
        .c-red { color: var(--casino-red); }
        .c-black { color: #ffffff; }
        .c-green { color: var(--casino-green); }
        
        .bg-red { background: linear-gradient(to bottom, #e52d2d, #a31515); }
        .bg-black { background: linear-gradient(to bottom, #2c2d30, #17181c); }
        .bg-green { background: linear-gradient(to bottom, #13b467, #0b7340); }
        .bg-orange { background: linear-gradient(to bottom, #f59e0b, #d97706); }
        .bg-blue { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); }
        .bg-dark-gray { background: #374151; }
        .bg-dark-red { background: #991b1b; }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <span class="brand-name">CASINO COMPAN</span>
        </div>
        <div class="croupier-box">
            <span>CROUPIER :</span><br>
            <span class="croupier-name">B. ETHAN</span>
        </div>
        <div class="table-badge">TABLE N°1</div>
    </header>

    <div class="main-layout">
        
        <div class="left-sidebar">
            <div class="current-number-box" id="mainDisplayBox">-</div>
            <div class="history-rows-container" id="historyContainer"></div>
        </div>

        <div class="right-content">
            
            <div class="roulette-ribbon-container">
                <div class="ribbon-viewport">
                    <div class="ribbon-wheel-track" id="wheelRibbon"></div>
                </div>
                <div class="ball-overlay"></div>
            </div>

            <div class="stats-section">
                <div>
                    <div class="stat-row-label">
                        <span>ROUGE</span>
                        <span>ZERO</span>
                        <span>NOIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-red" id="bar-red" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-1" style="width: 8px;"></div>
                        <div class="bar-segment bg-black" id="bar-black" style="width: 46%;">0%</div>
                    </div>
                </div>

                <div>
                    <div class="stat-row-label">
                        <span>IMPAIR</span>
                        <span>ZERO</span>
                        <span>PAIR</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar-segment bg-orange" id="bar-odd" style="width: 46%;">0%</div>
                        <div class="bar-separator" id="sep-zero-2" style="width: 8px;"></div>
                        <div class="bar-segment bg-blue" id="bar-even" style="width: 46%;">0%</div>
                    </div>
                </div>
            </div>

            <div class="hot-cold-section">
                <div class="hc-row">
                    <span class="hc-label">🔥</span>
                    <div class="hc-numbers" id="hotNums"></div>
                </div>
                <div class="hc-row">
                    <span class="hc-label">❄️</span>
                    <div class="hc-numbers" id="coldNums"></div>
                </div>
            </div>

            <div class="embedded-keypad">
                <div class="keypad-grid" id="gridButtons"></div>
                
                <div class="keypad-controls">
                    <button class="ctrl-btn bg-dark-gray" onclick="undoLast()">Retour (Undo)</button>
                    <button class="ctrl-btn bg-dark-red" onclick="clearAll()">Effacer Tout</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        var layoutOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        var redNumbers = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
        var historyData = [];

        function getNumberColor(num) {
            if (num === 0) return 'green';
            return redNumbers.indexOf(num) !== -1 ? 'red' : 'black';
        }

        function getButtonClass(num) {
            if (num === 0) return 'bg-green';
            return redNumbers.indexOf(num) !== -1 ? 'bg-red' : 'bg-black';
        }

        function init() {
            buildEmbeddedGrid();
            buildStaticRibbon();
            updateDashboard();
        }

        function buildEmbeddedGrid() {
            var grid = document.getElementById('gridButtons');
            grid.innerHTML = '';
            
            var btnZero = document.createElement('div');
            btnZero.className = 'key-btn bg-green';
            btnZero.textContent = '0';
            btnZero.onclick = function() { selectNumber(0); };
            grid.appendChild(btnZero);

            for(var i = 1; i <= 36; i++) {
                (function(num) {
                    var btn = document.createElement('div');
                    btn.className = 'key-btn ' + getButtonClass(num);
                    btn.textContent = num;
                    btn.onclick = function() { selectNumber(num); };
                    grid.appendChild(btn);
                })(i);
            }
        }

        function buildStaticRibbon() {
            var ribbon = document.getElementById('wheelRibbon');
            ribbon.style.transition = 'none';
            ribbon.style.left = '0px';
            ribbon.innerHTML = '<div class="ribbon-pocket bg-black">-</div><div class="ribbon-pocket bg-green active-pocket">0</div><div class="ribbon-pocket bg-black">-</div>';
        }

        function selectNumber(num) {
            historyData.push(num);
            animateRibbonTo(num);
            updateDashboard();
        }

        function animateRibbonTo(targetNum) {
            var ribbon = document.getElementById('wheelRibbon');
            var targetIdx = layoutOrder.indexOf(targetNum);
            
            var htmlContent = '';
            for (var i = 0; i < 7; i++) {
                var currentIdx = (targetIdx + i) % 37;
                var num = layoutOrder[currentIdx];
                var activeClass = i === 0 ? 'active-pocket' : '';
                htmlContent += '<div class="ribbon-pocket ' + getButtonClass(num) + ' ' + activeClass + '">' + num + '</div>';
            }
            
            ribbon.style.transition = 'none';
            ribbon.innerHTML = htmlContent;
            ribbon.style.left = '400px';
            
            setTimeout(function() {
                ribbon.style.transition = 'left 0.5s cubic-bezier(0.1, 0.7, 0.1, 1)';
                ribbon.style.left = '0px';
            }, 20);
        }

        function undoLast() {
            historyData.pop();
            var last = historyData[historyData.length - 1];
            if (last !== undefined) animateRibbonTo(last);
            else buildStaticRibbon();
            updateDashboard();
        }

        function clearAll() {
            historyData = [];
            buildStaticRibbon();
            updateDashboard();
        }

        function updateDashboard() {
            var mainBox = document.getElementById('mainDisplayBox');
            
            if (historyData.length > 0) {
                var last = historyData[historyData.length - 1];
                mainBox.textContent = last;
                if(getNumberColor(last) === 'red') mainBox.style.color = 'var(--casino-red)';
                else if(getNumberColor(last) === 'black') mainBox.style.color = '#ffffff';
                else mainBox.style.color = 'var(--casino-green)';
            } else {
                mainBox.textContent = '-';
                mainBox.style.color = '#ffffff';
            }

            renderSplitHistory();
            calculateStats();
            updateHotCold();
        }

        function renderSplitHistory() {
            var container = document.getElementById('historyContainer');
            container.innerHTML = '';
            
            var recent = historyData.slice().reverse();

            recent.forEach(function(num) {
                if (num === 0) {
                    container.innerHTML += '<div class="history-line zero-line"><div class="hist-cell c-green">' + num + '</div></div>';
                } else {
                    var color = getNumberColor(num);
                    if (color === 'red') {
                        container.innerHTML += '<div class="history-line"><div class="hist-cell c-red">' + num + '</div><div class="hist-cell empty">-</div></div>';
                    } else {
                        container.innerHTML += '<div class="history-line"><div class="hist-cell empty">-</div><div class="hist-cell c-black">' + num + '</div></div>';
                    }
                }
            });

            container.scrollTop = 0;
        }

        function updateHotCold() {
            var hotContainer = document.getElementById('hotNums');
            var coldContainer = document.getElementById('coldNums');
            
            if (historyData.length === 0) {
                hotContainer.innerHTML = '<span style="color:#555; font-size:1.4rem;">En attente...</span>';
                coldContainer.innerHTML = '<span style="color:#555; font-size:1.4rem;">En attente...</span>';
                return;
            }

            var frequencies = [];
            for (var i = 0; i < 37; i++) { frequencies.push({ num: i, count: 0 }); }
            historyData.forEach(function(num) { frequencies[num].count++; });

            var activeSort = frequencies.filter(function(f) { return f.count > 0; });
            
            var hotSorted = activeSort.slice().sort(function(a, b) { 
                return b.count - a.count || b.num - a.num; 
            });
            var coldSorted = activeSort.slice().sort(function(a, b) { 
                return a.count - b.count || a.num - b.num; 
            });

            hotContainer.innerHTML = hotSorted.slice(0, 4).map(function(f) { 
                return '<div class="hc-ball ' + getButtonClass(f.num) + '">' + f.num + '</div>';
            }).join('');

            coldContainer.innerHTML = coldSorted.slice(0, 4).map(function(f) { 
                return '<div class="hc-ball ' + getButtonClass(f.num) + '">' + f.num + '</div>';
            }).join('');
        }

        function calculateStats() {
            var total = historyData.length;
            
            if (total === 0) {
                document.getElementById('bar-red').style.width = "46%"; document.getElementById('bar-red').textContent = "0%";
                document.getElementById('bar-black').style.width = "46%"; document.getElementById('bar-black').textContent = "0%";
                document.getElementById('sep-zero-1').style.width = "8px"; document.getElementById('sep-zero-1').textContent = "";
                
                document.getElementById('bar-odd').style.width = "46%"; document.getElementById('bar-odd').textContent = "0%";
                document.getElementById('bar-even').style.width = "46%"; document.getElementById('bar-even').textContent = "0%";
                document.getElementById('sep-zero-2').style.width = "8px"; document.getElementById('sep-zero-2').textContent = "";
                return;
            }

            var red = 0, black = 0, zero = 0, odd = 0, even = 0;

            historyData.forEach(function(num) {
                if (num === 0) { zero++; } 
                else {
                    if (redNumbers.indexOf(num) !== -1) red++; else black++;
                    if (num % 2 !== 0) odd++; else even++;
                }
            });

            var pRed = Math.round((red / total) * 100);
            var pBlack = Math.round((black / total) * 100);
            var pZero = Math.round((zero / total) * 100);
            var pOdd = Math.round((odd / total) * 100);
            var pEven = Math.round((even / total) * 100);

            document.getElementById('bar-red').style.width = pRed > 0 ? pRed + '%' : '0%';
            document.getElementById('bar-red').textContent = pRed + '%';
            document.getElementById('bar-black').style.width = pBlack > 0 ? pBlack + '%' : '0%';
            document.getElementById('bar-black').textContent = pBlack + '%';
            
            var sep1 = document.getElementById('sep-zero-1');
            if (pZero > 0) { sep1.style.width = pZero + '%'; sep1.textContent = pZero + '%'; } 
            else { sep1.style.width = '10px'; sep1.textContent = ''; }

            document.getElementById('bar-odd').style.width = pOdd > 0 ? pOdd + '%' : '0%';
            document.getElementById('bar-odd').textContent = pOdd + '%';
            document.getElementById('bar-even').style.width = pEven > 0 ? pEven + '%' : '0%';
            document.getElementById('bar-even').textContent = pEven + '%';

            var sep2 = document.getElementById('sep-zero-2');
            if (pZero > 0) { sep2.style.width = pZero + '%'; sep2.textContent = pZero + '%'; } 
            else { sep2.style.width = '10px'; sep2.textContent = ''; }
        }

        window.onload = init;
    </script>
</body>
</html>
